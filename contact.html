<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kontakt - PaceLeague</title>
    <style>
        body { font-family: sans-serif; background-color: #0b111a; color: #ffffff; padding: 40px; }
        .card { background: #1e293a; padding: 25px; border-radius: 12px; border: 1px solid #313c4c; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0b111a; border: 1px solid #313c4c; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #ffffff; color: #000; padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        h1 { text-align: center; color: #7c83ff; }
        a { color: #97a1af; text-decoration: none; display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Kontakt</h1>
    <div class="card">
        <form action="#">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="E-Mail" required>
            <textarea rows="5" placeholder="Nachricht" required></textarea>
            <button type="submit">Senden</button>
        </form>
    </div>
    <a href="index.html">← Startseite</a>
</body>
</html>
